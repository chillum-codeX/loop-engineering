name: Documentation

on:
  push:
    branches: [ main ]

jobs:
  docs:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Validate documentation files
      run: |
        test -f README.md
        test -f docs/QUICKSTART.md
        test -f docs/tool-comparison.md
        test -f docs/FINAL_VALIDATION_REPORT.md
        test -f docs/TECHNICAL_CORRECTIONS_V3.md
